server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: son
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db_new
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
