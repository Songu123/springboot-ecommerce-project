<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Admin Panel - LifestyleShop'">Admin Panel</title>
    <meta name="description" content="LifestyleShop Admin Dashboard">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<!-- ─── SIDEBAR OVERLAY (mobile) ─────────────── -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- ─── SIDEBAR ───────────────────────────────── -->
<aside class="adm-sidebar" id="admSidebar">

    <!-- Brand -->
    <a href="/admin/dashboard" class="sb-brand">
        <div class="sb-brand-icon"><i class="fas fa-shopping-bag"></i></div>
        <span class="sb-brand-name">LifestyleShop</span>
        <span class="sb-brand-pill">ADMIN</span>
    </a>

    <!-- Nav scroll -->
    <nav class="sb-scroll" aria-label="Admin navigation">

        <!-- Overview -->
        <div class="sb-label">Tổng quan</div>
        <a href="/admin/dashboard" class="sb-link" data-path="/admin/dashboard">
            <span class="sb-icon"><i class="fas fa-chart-pie"></i></span>Dashboard
        </a>

        <!-- Store Management -->
        <div class="sb-label">Quản lý bán hàng</div>
        <a href="/admin/orders" class="sb-link" data-path="/admin/orders">
            <span class="sb-icon"><i class="fas fa-shopping-bag"></i></span>Đơn hàng
        </a>
        <a href="/admin/products" class="sb-link" data-path="/admin/products">
            <span class="sb-icon"><i class="fas fa-box"></i></span>Sản phẩm
        </a>
        <a href="/admin/categories" class="sb-link" data-path="/admin/categories">
            <span class="sb-icon"><i class="fas fa-tags"></i></span>Danh mục
        </a>

        <!-- Users -->
        <div class="sb-label">Người dùng</div>
        <a href="/admin/users" class="sb-link" data-path="/admin/users">
            <span class="sb-icon"><i class="fas fa-users"></i></span>Cấp quyền
        </a>
        <a href="/admin/chat" class="sb-link" data-path="/admin/chat">
            <span class="sb-icon"><i class="fas fa-comments"></i></span>Hỗ trợ trực tiếp
        </a>

        <!-- Reports -->
        <div class="sb-label">Phân tích</div>
        <a href="/admin/reports" class="sb-link" data-path="/admin/reports">
            <span class="sb-icon"><i class="fas fa-chart-line"></i></span>Báo cáo doanh thu
        </a>

        <!-- System -->
        <div class="sb-label">Hệ thống</div>
        <a href="/" class="sb-link" target="_blank" rel="noopener">
            <span class="sb-icon"><i class="fas fa-store"></i></span>Xem cửa hàng
        </a>
        <form th:action="@{/logout}" method="post" style="margin: 2px 10px;">
            <button type="submit" class="sb-link" style="width: calc(100% - 0px);">
                <span class="sb-icon"><i class="fas fa-sign-out-alt"></i></span>Đăng xuất
            </button>
        </form>
    </nav>

    <!-- Sidebar footer / user info -->
    <div class="sb-footer">
        <div class="sb-user">
            <div class="sb-avatar" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
            <div style="flex:1;min-width:0;">
                <div class="sb-user-name" th:text="${#authentication.name}">Admin</div>
                <div class="sb-user-role">Quản trị viên</div>
            </div>
        </div>
    </div>
</aside>

<!-- ─── HEADER ────────────────────────────────── -->
<header class="adm-header">
    <!-- Mobile toggle -->
    <button class="hdr-btn hdr-toggle" onclick="openSidebar()" aria-label="Menu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Search -->
    <div class="adm-header-search d-none d-md-block">
        <i class="fas fa-search hdr-search-icon"></i>
        <input type="text" id="globalSearch" placeholder="Tìm sản phẩm, đơn hàng, khách hàng...">
    </div>

    <!-- Right actions -->
    <div class="adm-header-right">

        <!-- Notification -->
        <button class="hdr-btn" title="Thông báo">
            <i class="fas fa-bell"></i>
            <span class="hdr-notif-dot d-none"></span>
        </button>

        <!-- Live Chat Inbox -->
        <a href="/admin/chat" class="hdr-btn position-relative" title="Hộp thư Hỗ trợ">
            <i class="fas fa-comment-dots"></i>
            <span class="hdr-notif-dot bg-danger" id="chatNotifBadge" style="display:none;"></span>
        </a>

        <!-- View store -->
        <a href="/" target="_blank" class="hdr-btn" title="Mở cửa hàng">
            <i class="fas fa-external-link-alt"></i>
        </a>

        <!-- User dropdown -->
        <div class="dropdown">
            <button class="hdr-btn d-flex align-items-center gap-2 px-2" data-bs-toggle="dropdown" aria-expanded="false">
                <div style="width:30px;height:30px;border-radius:50%;background:var(--adm-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.78rem;font-weight:700;"
                     th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
                <i class="fas fa-chevron-down" style="font-size:.6rem;color:var(--adm-txt-faint);"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end adm-dropdown-menu">
                <li>
                    <div style="padding:6px 10px;font-size:.78rem;color:var(--adm-txt-muted);" th:text="${#authentication.name}">Admin</div>
                </li>
                <li><div class="adm-dropdown-divider"></div></li>
                <li>
                    <a href="/profile" class="adm-dropdown-item">
                        <i class="fas fa-user-circle" style="color:var(--adm-primary);width:14px;"></i> Hồ sơ cá nhân
                    </a>
                </li>
                <li><div class="adm-dropdown-divider"></div></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" class="adm-dropdown-item danger">
                            <i class="fas fa-sign-out-alt" style="width:14px;"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>

<!-- ─── MAIN CONTENT ──────────────────────────── -->
<main class="adm-content">

    <!-- Flash messages -->
    <div th:if="${success}" class="adm-alert adm-alert-success" id="flashSuccess">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
        <button type="button" onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:inherit;padding:0;font-size:.9rem;"><i class="fas fa-times"></i></button>
    </div>
    <div th:if="${error}" class="adm-alert adm-alert-danger" id="flashError">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
        <button type="button" onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:inherit;padding:0;font-size:.9rem;"><i class="fas fa-times"></i></button>
    </div>
    <div th:if="${info}" class="adm-alert adm-alert-info" id="flashInfo">
        <i class="fas fa-info-circle"></i>
        <span th:text="${info}"></span>
    </div>
    <div th:if="${warning}" class="adm-alert adm-alert-warning" id="flashWarning">
        <i class="fas fa-exclamation-triangle"></i>
        <span th:text="${warning}"></span>
    </div>

    <!-- Toast Container for Real-time Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;" id="toastContainer">
        <!-- Toasts will be injected here via JS -->
    </div>



    <!-- Page content -->
    <div th:if="${content != null}" th:insert="~{${content} :: content}"></div>

</main>

<!-- ─── SCRIPTS ───────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/socket.js}"></script>
<script>
/* ── Active sidebar link ── */
(function () {
    const path = window.location.pathname;
    document.querySelectorAll('.sb-link[data-path]').forEach(link => {
        if (path.startsWith(link.getAttribute('data-path'))) {
            link.classList.add('active');
        }
    });
})();

/* ── Sidebar toggle ── */
function openSidebar() {
    document.getElementById('admSidebar').classList.add('open');
    document.getElementById('sbOverlay').classList.add('show');
}
function closeSidebar() {
    document.getElementById('admSidebar').classList.remove('open');
    document.getElementById('sbOverlay').classList.remove('show');
}

/* ── Auto-dismiss flash messages ── */
setTimeout(() => {
    ['flashSuccess','flashInfo'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.transition = 'opacity .4s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
    });
}, 4000);

/* ── STOMP Orders & Chat Initialization (Admin) ── */
let currentAdminRoomId = null;

function showOrderToast(title, body) {
    const toastHtml = `
      <div class="toast show shadow-sm" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header" style="background:var(--adm-primary);color:white;">
          <i class="fas fa-bell me-2"></i><strong class="me-auto">${title}</strong>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" onclick="this.closest('.toast').remove()"></button>
        </div>
        <div class="toast-body" style="background:var(--bg-card);">${body}</div>
      </div>
    `;
    document.getElementById('toastContainer').insertAdjacentHTML('beforeend', toastHtml);
    const newToast = document.getElementById('toastContainer').lastElementChild;
    setTimeout(() => newToast.remove(), 10000); // hide after 10s
}

document.addEventListener('DOMContentLoaded', () => {
    // We already have connectWebSocket from socket.js
    connectWebSocket(() => {
        // 1. Listen for new orders
        stompClient.subscribe('/topic/admin/orders', (msg) => {
            const data = JSON.parse(msg.body);
            showOrderToast(
                'Đơn hàng mới!',
                `Đơn hàng <strong>#${data.id}</strong> từ ${data.customerName}. Tổng: <span style="color:var(--adm-primary);font-weight:700;">${data.total}₫</span>`
            );
        });

        // 2. Listen for incoming global chat notifications (Customer -> Admin)
        stompClient.subscribe('/topic/admin/chats', (msg) => {
            const data = JSON.parse(msg.body);
            // Show toast notification with customer name
            showOrderToast('Tin nhắn hỗ trợ mới!', `Khách hàng <strong>${data.senderName || 'Khách Vãng Lai'}</strong> vừa gửi một tin nhắn.`);
            document.getElementById('chatNotifBadge').style.display = 'block';

            // If we are on the dedicated chat page, forward the message
            if (typeof window.onIncomingDedicatedMessage === 'function') {
                window.onIncomingDedicatedMessage(data);
            }
        });
    });
});
</script>

</body>
</html>
