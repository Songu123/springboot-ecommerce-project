<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Dashtreme Admin - Free Dashboard for Bootstrap 4 by Codervent</title>
    <!-- loader-->
    <!-- Pace CSS & JS -->
    <link th:href="@{/assets/css/pace.min.css}" rel="stylesheet"/>
    <script th:src="@{/assets/js/pace.min.js}"></script>

    <!-- Favicon -->
    <link th:href="@{/assets/images/favicon.ico}" rel="icon" type="image/x-icon"/>

    <!-- Vector CSS -->
    <link th:href="@{/assets/plugins/vectormap/jquery-jvectormap-2.0.2.css}" rel="stylesheet"/>

    <!-- simplebar CSS -->
    <link th:href="@{/assets/plugins/simplebar/css/simplebar.css}" rel="stylesheet"/>

    <!-- Bootstrap core CSS -->
    <link th:href="@{/assets/css/bootstrap.min.css}" rel="stylesheet"/>

    <!-- Animate CSS -->
    <link th:href="@{/assets/css/animate.css}" rel="stylesheet"/>

    <!-- Icons CSS -->
    <link th:href="@{/assets/css/icons.css}" rel="stylesheet"/>

    <!-- Sidebar CSS -->
    <link th:href="@{/assets/css/sidebar-menu.css}" rel="stylesheet"/>

    <!-- Custom Style -->
    <link th:href="@{/assets/css/app-style.css}" rel="stylesheet"/>
</head>

<body class="bg-theme bg-theme1">

<!-- Start wrapper-->
<div id="wrapper">

    <!--Start sidebar-wrapper-->
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <!--End sidebar-wrapper-->

    <!--Start topbar header-->
    <div th:replace="admin/fragments/header :: header"></div>
<!--    End topbar header-->

    <div class="clearfix"></div>

    <div class="content-wrapper">
        <div class="container-fluid">

            <div th:insert="~{${content} :: content}"></div>

        </div>
        <!-- End container-fluid-->

    </div><!--End content-wrapper-->
    <!--Start Back To Top Button-->
    <a href="javaScript:void();" class="back-to-top"><i class="fa fa-angle-double-up"></i> </a>
    <!--End Back To Top Button-->

    <!--Start footer-->
    <div th:replace="admin/fragments/footer :: footer"></div>
    <!--End footer-->

    <!--start color switcher-->
    <div class="right-sidebar">
        <div class="switcher-icon">
            <i class="zmdi zmdi-settings zmdi-hc-spin"></i>
        </div>
        <div class="right-sidebar-content">

            <p class="mb-0">Gaussion Texture</p>
            <hr>

            <ul class="switcher">
                <li id="theme1"></li>
                <li id="theme2"></li>
                <li id="theme3"></li>
                <li id="theme4"></li>
                <li id="theme5"></li>
                <li id="theme6"></li>
            </ul>

            <p class="mb-0">Gradient Background</p>
            <hr>

            <ul class="switcher">
                <li id="theme7"></li>
                <li id="theme8"></li>
                <li id="theme9"></li>
                <li id="theme10"></li>
                <li id="theme11"></li>
                <li id="theme12"></li>
                <li id="theme13"></li>
                <li id="theme14"></li>
                <li id="theme15"></li>
            </ul>

        </div>
    </div>
    <!--end color switcher-->

</div><!--End wrapper-->

<!-- Bootstrap core JavaScript -->
<script th:src="@{/assets/js/jquery.min.js}"></script>
<script th:src="@{/assets/js/popper.min.js}"></script>
<script th:src="@{/assets/js/bootstrap.min.js}"></script>

<!-- simplebar js -->
<script th:src="@{/assets/plugins/simplebar/js/simplebar.js}"></script>

<!-- sidebar-menu js -->
<script th:src="@{/assets/js/sidebar-menu.js}"></script>

<!-- Custom scripts -->
<script th:src="@{/assets/js/app-script.js}"></script>

<!-- Chart js -->
<script th:src="@{/assets/plugins/Chart.js/Chart.min.js}"></script>

<!-- Index js -->
<script th:src="@{/assets/js/index.js}"></script>


</body>
</html>
