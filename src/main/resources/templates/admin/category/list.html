<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách danh mục</title>
</head>
<body>
<div th:fragment="content">
    <div class="container-fluid">
        <h1 class="h3 mb-4 text-gray-800">Danh sách danh mục</h1>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <a th:href="@{/admin/categories/create}" class="btn btn-primary btn-sm">
                    <i class="fas fa-plus"></i> Thêm mới
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên danh mục</th>
                            <th>Slug</th>
                            <th style="width: 150px;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="fas fa-inbox fa-3x mb-3"></i>
                                <p>Chưa có danh mục nào. Hãy thêm danh mục mới!</p>
                            </td>
                        </tr>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.id}"></td>
                            <td th:text="${category.name}"></td>
                            <td>
                                <code th:text="${category.slug}"></code>
                            </td>
                            <td>
                                <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}"
                                   class="btn btn-info btn-sm" title="Chỉnh sửa">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/categories/delete/{id}(id=${category.id})}"
                                   class="btn btn-danger btn-sm"
                                   title="Xóa"
                                   onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
