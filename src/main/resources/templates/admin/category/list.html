<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Danh mục</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title">Quản lý danh mục</h1>
            <ul class="breadcrumb"><li><a href="/admin">Admin</a></li><li><span class="bc-active">Danh mục</span></li></ul>
        </div>
        <a href="/admin/categories/create" class="btn-a btn-primary"><i class="fas fa-plus"></i> Thêm danh mục</a>
    </div>

    <div class="row g-4">
        <!-- LEFT: list -->
        <div class="col-lg-8">
            <div class="adm-toolbar" style="margin-bottom:16px;">
                <div class="toolbar-search">
                    <i class="fas fa-search si"></i>
                    <input type="text" id="srchCat" placeholder="Tìm danh mục..." oninput="filterTable('srchCat','catTbody')">
                </div>
                <span class="toolbar-info">Tổng: <strong th:text="${totalItems}?:0">0</strong> danh mục</span>
            </div>
            <div class="adm-card">
                <div class="adm-card-body p-0">
                    <table class="adm-table">
                        <thead>
                        <tr>
                            <th style="width:40px">#</th>
                            <th>Tên danh mục</th>
                            <th>Slug</th>
                            <th>Sản phẩm</th>
                            <th style="text-align:right;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody id="catTbody">
                        <tr th:each="c,stat : ${categories}">
                            <td style="color:var(--adm-txt-faint);font-size:.78rem;" th:text="${(currentPage-1)*pageSize+stat.count}">1</td>
                            <td style="font-weight:600;" th:text="${c.name}">Name</td>
                            <td>
                                <code style="font-size:.77rem;color:var(--adm-primary);background:var(--adm-primary-pale);padding:2px 7px;border-radius:4px;"
                                      th:text="${c.slug}?:'—'">slug</code>
                            </td>
                            <td>
                                <span class="bdg bdg-user"
                                      th:text="${c.products != null ? c.products.size() : 0}+' sp'">0 sp</span>
                            </td>
                            <td>
                                <div class="d-flex justify-content-end gap-1">
                                    <a th:href="@{/admin/categories/edit/{id}(id=${c.id})}" class="btn-a btn-outline btn-icon btn-sm" title="Sửa"><i class="fas fa-edit"></i></a>
                                    <a th:href="@{/admin/categories/delete/{id}(id=${c.id})}" class="btn-a btn-danger btn-icon btn-sm" title="Xóa"
                                       th:attr="onclick='return confirmDel(\''+${c.name}+'\')'"><i class="fas fa-trash"></i></a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${categories==null or #lists.isEmpty(categories)}">
                            <td colspan="5" class="tbl-empty"><i class="fas fa-tags tbl-empty-icon"></i>Chưa có danh mục nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="adm-pagination" th:if="${totalPages > 1}">
                    <span class="pg-info">Trang <strong th:text="${currentPage}">1</strong> / <strong th:text="${totalPages}">1</strong></span>
                    <div class="pg-btns">
                        <a th:href="@{/admin/categories(page=${currentPage-1})}" class="pg-btn" th:classappend="${currentPage<=1}?'disabled'"><i class="fas fa-chevron-left"></i></a>
                        <a th:each="p : ${#numbers.sequence(1,totalPages)}" th:href="@{/admin/categories(page=${p})}" class="pg-btn" th:classappend="${p==currentPage}?'active'" th:text="${p}">1</a>
                        <a th:href="@{/admin/categories(page=${currentPage+1})}" class="pg-btn" th:classappend="${currentPage>=totalPages}?'disabled'"><i class="fas fa-chevron-right"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: quick add (only name + slug, matching entity) -->
        <div class="col-lg-4">
            <div class="adm-card">
                <div class="adm-card-header">
                    <span class="adm-card-title"><i class="fas fa-plus-circle" style="color:var(--adm-primary)"></i> Thêm nhanh</span>
                </div>
                <div class="adm-card-body">
                    <form th:action="@{/admin/categories/save}" method="post">
                        <div class="form-group">
                            <label class="form-label">Tên danh mục <span style="color:var(--adm-danger)">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                   placeholder="VD: Thời trang nam"
                                   id="catNameInput" oninput="genSlug(this.value)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Slug <span style="color:var(--adm-danger)">*</span></label>
                            <input type="text" name="slug" id="catSlugInput" class="form-control"
                                   required placeholder="thoi-trang-nam"
                                   pattern="[a-z0-9-]+" title="Chỉ dùng chữ thường, số và dấu gạch ngang">
                            <p class="form-hint">Dùng chữ thường và dấu gạch ngang</p>
                        </div>
                        <button type="submit" class="btn-a btn-primary btn-lg w-full">
                            <i class="fas fa-plus"></i> Tạo danh mục
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function genSlug(name) {
            const slug = name.toLowerCase()
                .replace(/[àáảãạăắặẳẵầấậẩẫ]/g, 'a')
                .replace(/[èéẻẽẹêếệểễề]/g, 'e')
                .replace(/[ìíỉĩị]/g, 'i')
                .replace(/[òóỏõọôồốộổỗơờớợởỡ]/g, 'o')
                .replace(/[ùúủũụưừứựửữ]/g, 'u')
                .replace(/[ỳýỷỹỵ]/g, 'y')
                .replace(/đ/g, 'd')
                .replace(/[^a-z0-9 ]/g, '')
                .trim().replace(/\s+/g, '-');
            document.getElementById('catSlugInput').value = slug;
        }
        function filterTable(inputId, tbodyId) {
            const q = document.getElementById(inputId).value.toLowerCase();
            document.querySelectorAll('#' + tbodyId + ' tr').forEach(r => {
                r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
        function confirmDel(name) {
            return confirm('Bạn có chắc muốn xóa danh mục "' + name + '"?');
        }
    </script>
</div>
</body>
</html>
