<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category List</title>
</head>
<body>

<h2>Category List</h2>

<a th:href="@{/admin/categories/create}">Add Category</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Slug</th>
        <th>Action</th>
    </tr>

    <tr th:each="c : ${categories}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.slug}"></td>
        <td>
            <a th:href="@{/admin/categories/edit/{id}(id=${c.id})}">Edit</a>
            <a th:href="@{/admin/categories/delete/{id}(id=${c.id})}"
               onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
