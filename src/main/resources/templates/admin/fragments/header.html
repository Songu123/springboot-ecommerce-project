<!--Start topbar-->
<div th:fragment="header" xmlns:th="http://www.w3.org/1999/xhtml">
<header class="topbar-nav">
    <div class="topbar-content">
        <!-- Left Section -->
        <div class="topbar-left">
            <button class="btn-menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <div class="search-bar-top">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search..." class="search-input">
            </div>
        </div>

        <!-- Right Section -->
        <div class="topbar-right">
            <!-- Notifications -->
            <button class="topbar-icon-btn" title="Notifications">
                <i class="fas fa-bell"></i>
                <span class="notification-badge">3</span>
            </button>

            <!-- Messages -->
            <button class="topbar-icon-btn" title="Messages">
                <i class="fas fa-envelope"></i>
                <span class="notification-badge">5</span>
            </button>

            <!-- User Profile -->
            <div class="user-profile-section dropdown">
                <button class="user-profile-btn" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=7B68EE&color=fff"
                         alt="User" class="user-avatar">
                    <span class="user-name">Admin User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li class="dropdown-item-header">
                        <div class="user-info">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=7B68EE&color=fff"
                                 alt="User" class="user-avatar-large">
                            <div>
                                <div class="user-name-large">Admin User</div>
                                <div class="user-email">admin@example.com</div>
                            </div>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fas fa-user me-2"></i>Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fas fa-cog me-2"></i>Settings
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>

<style>
    /* Topbar Styling - ClickUp Inspired */
    .topbar-nav {
        position: fixed;
        top: 0;
        left: 260px;
        right: 0;
        height: 64px;
        background: white;
        border-bottom: 1px solid #E5E7EB;
        z-index: 999;
        transition: left 0.3s ease;
    }

    .topbar-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 100%;
        padding: 0 2rem;
    }

    /* Left Section */
    .topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .btn-menu-toggle {
        background: none;
        border: none;
        color: #4B5563;
        font-size: 1.25rem;
        padding: 0.5rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        display: none;
    }

    .btn-menu-toggle:hover {
        background: #F3F4F6;
        color: #7B68EE;
    }

    .search-bar-top {
        position: relative;
        width: 400px;
    }

    .search-bar-top i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #9CA3AF;
    }

    .search-input {
        width: 100%;
        padding: 0.625rem 1rem 0.625rem 2.75rem;
        border: 1px solid #E5E7EB;
        border-radius: 10px;
        font-size: 0.875rem;
        background: #F9FAFB;
        transition: all 0.2s;
    }

    .search-input:focus {
        outline: none;
        border-color: #7B68EE;
        box-shadow: 0 0 0 3px rgba(123, 104, 238, 0.1);
        background: white;
    }

    /* Right Section */
    .topbar-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .topbar-icon-btn {
        position: relative;
        background: none;
        border: none;
        color: #4B5563;
        font-size: 1.125rem;
        padding: 0.625rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .topbar-icon-btn:hover {
        background: #F3F4F6;
        color: #7B68EE;
    }

    .notification-badge {
        position: absolute;
        top: 0.25rem;
        right: 0.25rem;
        background: #F94A4A;
        color: white;
        border-radius: 10px;
        padding: 0.125rem 0.375rem;
        font-size: 0.625rem;
        font-weight: 600;
        min-width: 18px;
        text-align: center;
    }

    /* User Profile */
    .user-profile-section {
        margin-left: 0.5rem;
    }

    .user-profile-btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: none;
        border: none;
        padding: 0.5rem 0.75rem;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .user-profile-btn:hover {
        background: #F3F4F6;
    }

    .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 2px solid #E5E7EB;
    }

    .user-name {
        font-size: 0.9375rem;
        font-weight: 500;
        color: #1F2937;
    }

    .user-profile-btn i {
        font-size: 0.75rem;
        color: #9CA3AF;
    }

    /* Dropdown */
    .dropdown-menu {
        border: 1px solid #E5E7EB;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 0.5rem;
        min-width: 250px;
        margin-top: 0.5rem;
    }

    .dropdown-item-header {
        padding: 1rem;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .user-avatar-large {
        width: 48px;
        height: 48px;
        border-radius: 10px;
    }

    .user-name-large {
        font-weight: 600;
        color: #1F2937;
        font-size: 0.9375rem;
    }

    .user-email {
        font-size: 0.8125rem;
        color: #6B7280;
    }

    .dropdown-item {
        padding: 0.625rem 1rem;
        border-radius: 8px;
        font-size: 0.875rem;
        transition: all 0.15s;
    }

    .dropdown-item:hover {
        background: #F3F4F6;
    }

    .dropdown-item.text-danger:hover {
        background: #FEF2F2;
        color: #DC2626 !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .topbar-nav {
            left: 0;
        }

        .btn-menu-toggle {
            display: block;
        }

        .search-bar-top {
            display: none;
        }

        .user-name {
            display: none;
        }
    }
</style>
</div>
<!--End topbar-->
