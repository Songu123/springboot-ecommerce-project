<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Chỉnh sửa đơn hàng</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title" th:text="'Chỉnh sửa đơn hàng #'+${order.id}">Edit</h1>
            <ul class="breadcrumb"><li><a href="/admin">Admin</a></li><li><a href="/admin/orders">Đơn hàng</a></li><li><span class="bc-active">Chỉnh sửa</span></li></ul>
        </div>
        <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn-a btn-ghost"><i class="fas fa-arrow-left"></i> Xem chi tiết</a>
    </div>

    <form th:action="@{/admin/orders/update/{id}(id=${order.id})}" method="post">
        <div class="row g-4">
            <div class="col-lg-8">
                <!-- Status -->
                <div class="adm-card mb-4">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-tasks" style="color:var(--adm-primary)"></i> Trạng thái đơn hàng</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Trạng thái <span style="color:var(--adm-danger)">*</span></label>
                                    <select name="status" class="form-control" required>
                                        <option value="PENDING"    th:selected="${order.status=='PENDING'}">Chờ xử lý</option>
                                        <option value="CONFIRMED"  th:selected="${order.status=='CONFIRMED'}">Đã xác nhận</option>
                                        <option value="PROCESSING" th:selected="${order.status=='PROCESSING'}">Đang xử lý</option>
                                        <option value="SHIPPED"    th:selected="${order.status=='SHIPPED'}">Đang giao hàng</option>
                                        <option value="DELIVERED"  th:selected="${order.status=='DELIVERED'}">Đã giao hàng</option>
                                        <option value="CANCELLED"  th:selected="${order.status=='CANCELLED'}">Đã hủy</option>
                                        <option value="REFUNDED"   th:selected="${order.status=='REFUNDED'}">Đã hoàn tiền</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Thanh toán <span style="color:var(--adm-danger)">*</span></label>
                                    <select name="paymentStatus" class="form-control" required>
                                        <option value="UNPAID"   th:selected="${order.paymentStatus=='UNPAID' or order.paymentStatus==null}">Chưa thanh toán</option>
                                        <option value="PAID"     th:selected="${order.paymentStatus=='PAID'}">Đã thanh toán</option>
                                        <option value="REFUNDED" th:selected="${order.paymentStatus=='REFUNDED'}">Đã hoàn tiền</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Shipping -->
                <div class="adm-card mb-4">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-truck" style="color:var(--adm-primary)"></i> Thông tin giao hàng</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Địa chỉ giao hàng</label>
                                    <textarea name="shippingAddress" class="form-control" rows="2" th:text="${order.shippingAddress}"></textarea>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Thành phố</label>
                                    <input type="text" name="shippingCity" class="form-control" th:value="${order.shippingCity}" placeholder="Hà Nội">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Mã bưu điện</label>
                                    <input type="text" name="shippingPostalCode" class="form-control" th:value="${order.shippingPostalCode}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Điện thoại</label>
                                    <input type="text" name="shippingPhone" class="form-control" th:value="${order.shippingPhone}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Mã vận đơn</label>
                                    <input type="text" name="trackingNumber" class="form-control" th:value="${order.trackingNumber}" placeholder="TRK123...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Phương thức thanh toán</label>
                                    <select name="paymentMethod" class="form-control">
                                        <option value="">-- Chọn --</option>
                                        <option value="COD"           th:selected="${order.paymentMethod=='COD'}">COD (Tiền mặt)</option>
                                        <option value="CREDIT_CARD"   th:selected="${order.paymentMethod=='CREDIT_CARD'}">Thẻ tín dụng</option>
                                        <option value="BANK_TRANSFER" th:selected="${order.paymentMethod=='BANK_TRANSFER'}">Chuyển khoản</option>
                                        <option value="MOMO"          th:selected="${order.paymentMethod=='MOMO'}">MoMo</option>
                                        <option value="VNPAY"         th:selected="${order.paymentMethod=='VNPAY'}">VNPay</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Additional -->
                <div class="adm-card mb-4">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-info-circle" style="color:var(--adm-primary)"></i> Thông tin bổ sung</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Phí vận chuyển (₫)</label>
                                    <input type="number" name="shippingFee" class="form-control" th:value="${order.shippingFee}" min="0" step="1000">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Giảm giá (₫)</label>
                                    <input type="number" name="discount" class="form-control" th:value="${order.discount}" min="0" step="1000">
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Ghi chú</label>
                                    <textarea name="note" class="form-control" rows="3" th:text="${order.note}"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn-a btn-primary btn-lg"><i class="fas fa-save"></i> Lưu thay đổi</button>
                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn-a btn-ghost btn-lg">Hủy bỏ</a>
                </div>
            </div>

            <!-- Summary sidebar -->
            <div class="col-lg-4">
                <div class="adm-card mb-3">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-receipt" style="color:var(--adm-primary)"></i> Tổng kết</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="detail-row"><span class="detail-row-label">Mã đơn</span><strong style="color:var(--adm-primary);" th:text="'#'+${order.id}">#0</strong></div>
                        <div class="detail-row"><span class="detail-row-label">Tổng tiền</span><strong style="color:var(--adm-success);" th:text="${#numbers.formatDecimal(order.totalPrice?:0,0,'COMMA',0,'POINT')}+'₫'">0₫</strong></div>
                        <div class="detail-row"><span class="detail-row-label">Ngày tạo</span><strong th:text="${order.createdAt!=null}?${#temporals.format(order.createdAt,'dd/MM/yyyy')}:'—'">Date</strong></div>
                    </div>
                </div>
                <div class="adm-card">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-user" style="color:var(--adm-primary)"></i> Khách hàng</span>
                    </div>
                    <div class="adm-card-body text-center">
                        <div class="tbl-avatar" style="width:44px;height:44px;font-size:1rem;margin:0 auto 10px;"
                             th:text="${(order.user?.fullName ?: (order.user?.username ?: 'U')).substring(0,1).toUpperCase()}">U</div>
                        <p style="font-weight:700;margin:0;" th:text="${order.user?.fullName ?: (order.user?.username ?: 'N/A')}">Name</p>
                        <p style="font-size:.78rem;color:var(--adm-txt-muted);" th:text="${order.user?.email}?:'—'">email</p>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
