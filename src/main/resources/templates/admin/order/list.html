<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Đơn hàng</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title">Quản lý đơn hàng</h1>
            <ul class="breadcrumb"><li><a href="/admin">Admin</a></li><li><span class="bc-active">Đơn hàng</span></li></ul>
        </div>
    </div>

    <!-- KPI mini -->
    <div class="row g-3 mb-3">
        <div class="col-6 col-lg-3">
            <a href="/admin/orders?status=PENDING" style="text-decoration:none;">
                <div class="stat-card" style="padding:14px;">
                    <div class="stat-icon si-amber" style="width:40px;height:40px;font-size:1rem;"><i class="fas fa-clock"></i></div>
                    <div><p class="stat-label">Chờ xử lý</p><p class="stat-value" style="font-size:1.3rem;" th:text="${statistics?.get('PENDING')}?:0">0</p></div>
                </div>
            </a>
        </div>
        <div class="col-6 col-lg-3">
            <a href="/admin/orders?status=SHIPPED" style="text-decoration:none;">
                <div class="stat-card" style="padding:14px;">
                    <div class="stat-icon si-purple" style="width:40px;height:40px;font-size:1rem;"><i class="fas fa-truck"></i></div>
                    <div><p class="stat-label">Đang giao</p><p class="stat-value" style="font-size:1.3rem;" th:text="${statistics?.get('SHIPPED')}?:0">0</p></div>
                </div>
            </a>
        </div>
        <div class="col-6 col-lg-3">
            <a href="/admin/orders?status=DELIVERED" style="text-decoration:none;">
                <div class="stat-card" style="padding:14px;">
                    <div class="stat-icon si-green" style="width:40px;height:40px;font-size:1rem;"><i class="fas fa-check-circle"></i></div>
                    <div><p class="stat-label">Đã giao</p><p class="stat-value" style="font-size:1.3rem;" th:text="${statistics?.get('DELIVERED')}?:0">0</p></div>
                </div>
            </a>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card" style="padding:14px;">
                <div class="stat-icon si-green" style="width:40px;height:40px;font-size:1rem;"><i class="fas fa-dollar-sign"></i></div>
                <div>
                    <p class="stat-label">Doanh thu</p>
                    <p class="stat-value" style="font-size:1rem;" th:text="${#numbers.formatDecimal(totalRevenue?:0,0,'COMMA',0,'POINT')}+'₫'">0₫</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <form method="get" action="/admin/orders">
        <div class="adm-toolbar">
            <div class="toolbar-search">
                <i class="fas fa-search si"></i>
                <input type="text" name="search" placeholder="Tìm theo tên KH, mã đơn..." th:value="${searchKeyword}">
            </div>
            <select name="status" class="toolbar-select" onchange="this.form.submit()">
                <option value="">Tất cả trạng thái</option>
                <option value="PENDING"   th:selected="${selectedStatus=='PENDING'}">Chờ xử lý</option>
                <option value="CONFIRMED" th:selected="${selectedStatus=='CONFIRMED'}">Đã xác nhận</option>
                <option value="SHIPPED"   th:selected="${selectedStatus=='SHIPPED'}">Đang giao</option>
                <option value="DELIVERED" th:selected="${selectedStatus=='DELIVERED'}">Đã giao</option>
                <option value="CANCELLED" th:selected="${selectedStatus=='CANCELLED'}">Đã hủy</option>
            </select>
            <button type="submit" class="btn-a btn-primary btn-sm"><i class="fas fa-search"></i> Tìm</button>
            <a href="/admin/orders" class="btn-a btn-ghost btn-sm"><i class="fas fa-redo"></i> Reset</a>
            <span class="toolbar-info">Tổng: <strong th:text="${totalItems}?:0">0</strong> đơn</span>
        </div>
    </form>

    <div class="adm-card">
        <div class="adm-card-body p-0">
            <table class="adm-table">
                <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Địa chỉ</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thanh toán</th>
                    <th>Ngày tạo</th>
                    <th style="text-align:right;">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td>
                        <a th:href="@{/admin/orders/{id}(id=${o.id})}" style="font-weight:700;color:var(--adm-primary);" th:text="'#'+${o.id}">#0</a>
                    </td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="tbl-avatar" th:text="${(o.user?.fullName ?: (o.user?.username ?: 'U')).substring(0,1).toUpperCase()}">U</div>
                            <div>
                                <p style="font-size:.82rem;font-weight:600;margin:0;" th:text="${o.user?.fullName ?: (o.user?.username ?: 'N/A')}">User</p>
                                <p style="font-size:.72rem;color:var(--adm-txt-faint);margin:0;" th:text="${o.user?.email}?:''">email</p>
                            </div>
                        </div>
                    </td>
                    <td style="max-width:150px;">
                        <p style="font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;" th:text="${o.shippingCity}?:'N/A'">City</p>
                    </td>
                    <td style="font-weight:700;color:var(--adm-success);" th:text="${#numbers.formatDecimal(o.totalPrice?:0,0,'COMMA',0,'POINT')}+'₫'">0₫</td>
                    <td>
                        <span class="bdg"
                              th:classappend="${o.status=='PENDING'?'bdg-pending':o.status=='CONFIRMED'?'bdg-confirmed':o.status=='PROCESSING'?'bdg-processing':o.status=='SHIPPED'?'bdg-shipped':o.status=='DELIVERED'?'bdg-delivered':'bdg-cancelled'}"
                              th:text="${o.status}?:'N/A'">-</span>
                    </td>
                    <td>
                        <span class="bdg" th:classappend="${o.paymentStatus=='PAID'?'bdg-paid':'bdg-unpaid'}"
                              th:text="${o.paymentStatus}?:'UNPAID'">-</span>
                    </td>
                    <td style="font-size:.78rem;color:var(--adm-txt-muted);"
                        th:text="${o.createdAt!=null}?${#temporals.format(o.createdAt,'dd/MM/yy')}:'—'">Date</td>
                    <td>
                        <div class="d-flex justify-content-end gap-1">
                            <a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn-a btn-ghost btn-icon btn-sm" title="Chi tiết"><i class="fas fa-eye"></i></a>
                            <a th:href="@{/admin/orders/edit/{id}(id=${o.id})}" class="btn-a btn-outline btn-icon btn-sm" title="Sửa"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/admin/orders/{id}/print(id=${o.id})}" class="btn-a btn-info btn-icon btn-sm" title="In" target="_blank"><i class="fas fa-print"></i></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${orders==null or #lists.isEmpty(orders)}">
                    <td colspan="8" class="tbl-empty"><i class="fas fa-shopping-bag tbl-empty-icon"></i>Không tìm thấy đơn hàng</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="adm-pagination" th:if="${totalPages>1}">
            <span class="pg-info">Hiển thị <strong th:text="${displayStartIndex}">1</strong>–<strong th:text="${displayEndIndex}">10</strong> / <strong th:text="${totalItems}">0</strong></span>
            <div class="pg-btns">
                <a th:href="@{/admin/orders(page=${currentPage-1},status=${selectedStatus},search=${searchKeyword})}" class="pg-btn" th:classappend="${currentPage<=1}?'disabled'"><i class="fas fa-chevron-left"></i></a>
                <a th:each="p : ${#numbers.sequence(1,totalPages)}" th:href="@{/admin/orders(page=${p},status=${selectedStatus},search=${searchKeyword})}" class="pg-btn" th:classappend="${p==currentPage}?'active'" th:text="${p}">1</a>
                <a th:href="@{/admin/orders(page=${currentPage+1},status=${selectedStatus},search=${searchKeyword})}" class="pg-btn" th:classappend="${currentPage>=totalPages}?'disabled'"><i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
