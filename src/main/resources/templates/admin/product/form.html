<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Form Sản phẩm</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title" th:text="${product.id!=null}?'Chỉnh sửa sản phẩm':'Thêm sản phẩm mới'">Form</h1>
            <ul class="breadcrumb">
                <li><a href="/admin">Admin</a></li>
                <li><a href="/admin/products">Sản phẩm</a></li>
                <li><span class="bc-active" th:text="${product.id!=null}?'Chỉnh sửa':'Thêm mới'">Form</span></li>
            </ul>
        </div>
        <a href="/admin/products" class="btn-a btn-ghost"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </div>

    <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data" id="productForm">
        <input type="hidden" name="id" th:value="${product.id}">
        <input type="hidden" name="image" id="imageUrlInput" th:value="${product.image}">

        <div class="row g-4">
            <!-- LEFT col -->
            <div class="col-lg-8">
                <!-- Basic info -->
                <div class="adm-card mb-4">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-info-circle" style="color:var(--adm-primary)"></i> Thông tin cơ bản</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="form-group">
                            <label class="form-label">Tên sản phẩm <span style="color:var(--adm-danger)">*</span></label>
                            <input type="text" name="name" class="form-control" placeholder="Nhập tên sản phẩm..." required th:value="${product.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mô tả sản phẩm</label>
                            <textarea name="description" class="form-control" rows="5" placeholder="Mô tả chi tiết..." th:text="${product.description}"></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Giá bán (₫) <span style="color:var(--adm-danger)">*</span></label>
                                    <div class="input-icon-wrap">
                                        <i class="fas fa-tag icon"></i>
                                        <input type="number" name="price" class="form-control" placeholder="0" min="0" step="1000" required th:value="${product.price}">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <!-- Entity field is 'quantity' not 'stock' -->
                                    <label class="form-label">Số lượng tồn kho</label>
                                    <div class="input-icon-wrap">
                                        <i class="fas fa-boxes icon"></i>
                                        <input type="number" name="quantity" class="form-control" placeholder="0" min="0" th:value="${product.quantity}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Image -->
                <div class="adm-card">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-image" style="color:var(--adm-primary)"></i> Hình ảnh sản phẩm</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="row g-3 align-items-start">
                            <div class="col-auto">
                                <div class="img-upload-box" onclick="document.getElementById('imageFileInput').click()">
                                    <img id="imgPreview"
                                         th:src="${product.image != null and !#strings.isEmpty(product.image)} ? ${product.image} : '/images/placeholder.png'"
                                         alt="Preview" onerror="this.src='/images/placeholder.png'">
                                </div>
                                <p class="form-hint text-center" style="margin-top:5px;">Nhấn để đổi ảnh</p>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label class="form-label">URL Hình ảnh</label>
                                    <input type="text" id="imageUrlField" class="form-control" placeholder="https://..." th:value="${product.image}" oninput="updateImageFromUrl(this.value)">
                                    <p class="form-hint">Nhập URL trực tiếp hoặc upload file bên dưới</p>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Upload file ảnh</label>
                                    <input type="file" id="imageFileInput" name="imageFile" accept="image/*" class="form-control" onchange="previewUpload(event)">
                                    <p class="form-hint">JPG, PNG, WebP — tối đa 5MB</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT col -->
            <div class="col-lg-4">
                <div class="adm-card mb-4">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-cog" style="color:var(--adm-primary)"></i> Phân loại</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="form-group">
                            <label class="form-label">Danh mục <span style="color:var(--adm-danger)">*</span></label>
                            <select name="category.id" class="form-control" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}"
                                        th:selected="${product.category != null and product.category.id == c.id}">Cat</option>
                            </select>
                            <p class="form-hint">Bắt buộc chọn danh mục</p>
                        </div>
                    </div>
                </div>

                <!-- Info card (edit only) -->
                <div class="adm-card mb-4" th:if="${product.id != null}">
                    <div class="adm-card-header">
                        <span class="adm-card-title"><i class="fas fa-info-circle" style="color:var(--adm-primary)"></i> Thông tin</span>
                    </div>
                    <div class="adm-card-body">
                        <div class="detail-row"><span class="detail-row-label">ID</span><strong th:text="${product.id}">0</strong></div>
                        <div class="detail-row"><span class="detail-row-label">Danh mục</span><strong th:text="${product.category?.name}?:'—'">—</strong></div>
                        <div class="detail-row"><span class="detail-row-label">Giá hiện tại</span><strong style="color:var(--adm-primary);" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')}+'₫'">0₫</strong></div>
                        <div class="detail-row"><span class="detail-row-label">Tồn kho</span><strong th:text="${product.quantity}+' cái'">0 cái</strong></div>
                    </div>
                </div>

                <div class="adm-card">
                    <div class="adm-card-body">
                        <button type="submit" class="btn-a btn-primary btn-lg w-full">
                            <i class="fas fa-save"></i>
                            <span th:text="${product.id!=null}?'Lưu thay đổi':'Tạo sản phẩm'">Lưu</span>
                        </button>
                        <a href="/admin/products" class="btn-a btn-ghost btn-lg w-full mt-2 d-flex justify-content-center">Hủy bỏ</a>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <script>
        function previewUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                document.getElementById('imgPreview').src = ev.target.result;
                document.getElementById('imageUrlInput').value = '';
                document.getElementById('imageUrlField').value = '';
            };
            reader.readAsDataURL(file);
        }
        function updateImageFromUrl(url) {
            document.getElementById('imageUrlInput').value = url;
            if (url) document.getElementById('imgPreview').src = url;
        }
    </script>
</div>
</body>
</html>
