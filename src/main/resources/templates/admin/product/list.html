<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Danh sách sản phẩm</title>
</head>
<body>
<div th:fragment="content">
  <div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Danh sách sản phẩm</h1>

    <div class="card shadow mb-4">
      <div class="card-header py-3">
        <a th:href="@{/admin/products/create}" class="btn btn-primary btn-sm">
          <i class="fas fa-plus"></i> Thêm mới
        </a>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-bordered" id="dataTable">
            <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Image</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Description</th>
              <th style="width:150px">Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(products)}">
              <td colspan="4" class="text-center text-muted">
                Chưa có sản phẩm
              </td>
            </tr>

            <tr th:each="product : ${products}">
              <td th:text="${product.id}"></td>
              <td th:text="${product.name}"></td>
              <td th:text="${product.image}"></td>
              <td th:text="${product.price}"></td>
              <td th:text="${product.quantity}"></td>
              <td th:text="${product.Description}"></td>
              <td>
                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                   class="btn btn-info btn-sm">Sửa</a>

                <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xóa?')">Xóa</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
