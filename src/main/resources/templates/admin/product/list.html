<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Sản phẩm</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title">Quản lý sản phẩm</h1>
            <ul class="breadcrumb"><li><a href="/admin">Admin</a></li><li><span class="bc-active">Sản phẩm</span></li></ul>
        </div>
        <a href="/admin/products/create" class="btn-a btn-primary"><i class="fas fa-plus"></i> Thêm sản phẩm</a>
    </div>

    <!-- Toolbar -->
    <div class="adm-toolbar">
        <div class="toolbar-search">
            <i class="fas fa-search si"></i>
            <input type="text" id="srchProd" placeholder="Tìm theo tên sản phẩm..." oninput="filterTable('srchProd','productTbody')">
        </div>
        <span class="toolbar-info">Tổng: <strong th:text="${totalItems}?:0">0</strong> sản phẩm</span>
    </div>

    <div class="adm-card">
        <div class="adm-card-body p-0">
            <table class="adm-table">
                <thead>
                <tr>
                    <th style="width:40px">#</th>
                    <th>Sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá bán</th>
                    <th>Số lượng</th>
                    <th style="width:120px;text-align:right;">Thao tác</th>
                </tr>
                </thead>
                <tbody id="productTbody">
                <tr th:each="p,stat : ${products}">
                    <td style="color:var(--adm-txt-faint);font-size:.78rem;" th:text="${(currentPage-1)*pageSize+stat.count}">1</td>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${p.image}?:'/img/product-default.jpg'" class="tbl-img" th:alt="${p.name}">
                            <div>
                                <p style="font-weight:600;font-size:.875rem;margin:0;" th:text="${p.name}">Name</p>
                                <p style="font-size:.73rem;color:var(--adm-txt-faint);margin:0;" th:text="'ID: '+${p.id}">ID</p>
                            </div>
                        </div>
                    </td>
                    <td><span class="bdg bdg-user" th:text="${p.category?.name}?:'N/A'">Cat</span></td>
                    <td style="font-weight:700;color:var(--adm-primary);" th:text="${#numbers.formatDecimal(p.price?:0,0,'COMMA',0,'POINT')}+'₫'">0₫</td>
                    <td><strong th:text="${p.quantity}+' cái'">0 cái</strong></td>
                    <td>
                        <div class="d-flex justify-content-end gap-1">
                            <a th:href="@{/products/{id}(id=${p.id})}" target="_blank" class="btn-a btn-ghost btn-icon btn-sm" title="Xem"><i class="fas fa-eye"></i></a>
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn-a btn-outline btn-icon btn-sm" title="Sửa"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" class="btn-a btn-danger btn-icon btn-sm" title="Xóa"
                               th:attr="onclick='return confirmDel(\''+${p.name}+'\')'"><i class="fas fa-trash"></i></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${products==null or #lists.isEmpty(products)}">
                    <td colspan="6" class="tbl-empty"><i class="fas fa-box tbl-empty-icon"></i>Chưa có sản phẩm nào</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="adm-pagination" th:if="${totalPages > 1}">
            <span class="pg-info">Hiển thị <strong th:text="${displayStartIndex}">1</strong>–<strong th:text="${displayEndIndex}">10</strong> / <strong th:text="${totalItems}">0</strong></span>
            <div class="pg-btns">
                <a th:href="@{/admin/products(page=${currentPage-1})}" class="pg-btn" th:classappend="${currentPage<=1}?'disabled'"><i class="fas fa-chevron-left"></i></a>
                <a th:each="p : ${#numbers.sequence(1,totalPages)}" th:href="@{/admin/products(page=${p})}" class="pg-btn" th:classappend="${p==currentPage}?'active'" th:text="${p}">1</a>
                <a th:href="@{/admin/products(page=${currentPage+1})}" class="pg-btn" th:classappend="${currentPage>=totalPages}?'disabled'"><i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>

    <script>
        function filterTable(inputId, tbodyId) {
            const q = document.getElementById(inputId).value.toLowerCase();
            document.querySelectorAll('#'+tbodyId+' tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
        function confirmDel(name) {
            return confirm('Bạn có chắc muốn xóa sản phẩm "' + name + '"?');
        }
    </script>
</div>
</body>
</html>
