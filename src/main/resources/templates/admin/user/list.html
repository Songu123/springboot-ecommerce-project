<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title>Người dùng</title></head>
<body>
<div th:fragment="content">

    <div class="page-hdr">
        <div>
            <h1 class="page-title">Quản lý người dùng</h1>
            <ul class="breadcrumb"><li><a href="/admin">Admin</a></li><li><span class="bc-active">Người dùng</span></li></ul>
        </div>
        <a href="/admin/users/create" class="btn-a btn-primary"><i class="fas fa-user-plus"></i> Thêm người dùng</a>
    </div>

    <div class="adm-toolbar">
        <div class="toolbar-search">
            <i class="fas fa-search si"></i>
            <input type="text" id="srchUser" placeholder="Tìm theo tên, email..." oninput="filterTable('srchUser','userTbody')">
        </div>
        <span class="toolbar-info">Tổng: <strong th:text="${totalItems}?:0">0</strong> tài khoản</span>
    </div>

    <div class="adm-card">
        <div class="adm-card-body p-0">
            <table class="adm-table">
                <thead>
                <tr>
                    <th style="width:40px">#</th>
                    <th>Người dùng</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th style="text-align:right;">Thao tác</th>
                </tr>
                </thead>
                <tbody id="userTbody">
                <tr th:each="u,stat : ${users}">
                    <td style="color:var(--adm-txt-faint);font-size:.78rem;" th:text="${(currentPage-1)*pageSize+stat.count}">1</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="tbl-avatar" th:text="${(u.fullName ?: (u.username ?: 'U')).substring(0,1).toUpperCase()}">U</div>
                            <div>
                                <p style="font-weight:600;font-size:.875rem;margin:0;" th:text="${u.fullName ?: (u.username ?: 'N/A')}">Name</p>
                                <p style="font-size:.72rem;color:var(--adm-txt-faint);margin:0;" th:text="'@'+${u.username}">@user</p>
                            </div>
                        </div>
                    </td>
                    <td style="font-size:.82rem;" th:text="${u.email}?:'—'">email</td>
                    <td>
                        <span th:each="r : ${u.roles}">
                            <span class="bdg" th:classappend="${r.name=='ROLE_ADMIN'?'bdg-admin':r.name=='ROLE_MANAGER'?'bdg-shipped':'bdg-user'}"
                                  th:text="${r.name?.replace('ROLE_','')}">ROLE</span>
                        </span>
                    </td>
                    <td>
                        <span class="bdg" th:classappend="${u.enabled}?'bdg-active':'bdg-inactive'"
                              th:text="${u.enabled}?'Hoạt động':'Vô hiệu'">Status</span>
                    </td>
                    <td style="font-size:.78rem;color:var(--adm-txt-muted);"
                        th:text="${u.createdAt!=null}?${#temporals.format(u.createdAt,'dd/MM/yyyy')}:'—'">Date</td>
                    <td>
                        <div class="d-flex justify-content-end gap-1">
                            <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn-a btn-outline btn-icon btn-sm" title="Sửa"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn-a btn-danger btn-icon btn-sm" title="Xóa"
                               th:attr="onclick='return confirm(\'Xóa người dùng \\\'' + ${u.username} + '\\\'?\')'"><i class="fas fa-trash"></i></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${users==null or #lists.isEmpty(users)}">
                    <td colspan="7" class="tbl-empty"><i class="fas fa-users tbl-empty-icon"></i>Chưa có người dùng nào</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="adm-pagination" th:if="${totalPages>1}">
            <span class="pg-info">Hiển thị <strong th:text="${displayStartIndex}">1</strong>–<strong th:text="${displayEndIndex}">10</strong> / <strong th:text="${totalItems}">0</strong></span>
            <div class="pg-btns">
                <a th:href="@{/admin/users(page=${currentPage-1})}" class="pg-btn" th:classappend="${currentPage<=1}?'disabled'"><i class="fas fa-chevron-left"></i></a>
                <a th:each="p : ${#numbers.sequence(1,totalPages)}" th:href="@{/admin/users(page=${p})}" class="pg-btn" th:classappend="${p==currentPage}?'active'" th:text="${p}">1</a>
                <a th:href="@{/admin/users(page=${currentPage+1})}" class="pg-btn" th:classappend="${currentPage>=totalPages}?'disabled'"><i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>

    <script>
        function filterTable(inputId, tbodyId) {
            const q = document.getElementById(inputId).value.toLowerCase();
            document.querySelectorAll('#' + tbodyId + ' tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none');
        }
    </script>
</div>
</body>
</html>
