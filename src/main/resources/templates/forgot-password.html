<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - E-Commerce</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-key"></i> Quên Mật Khẩu
                </h2>
                <p>Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu</p>
            </div>

            <div class="card-body">
                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}"></span>
                </div>

                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Info Message -->
                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    Vui lòng nhập email liên kết với tài khoản của bạn. Chúng tôi sẽ gửi một liên kết đặt lại mật khẩu đến email của bạn.
                </div>

                <!-- Form -->
                <form id="forgotPasswordForm" th:if="${success == null}">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope" style="color: #667eea; margin-right: 5px;"></i>
                            Địa chỉ Email
                        </label>
                        <input type="email"
                               id="email"
                               name="email"
                               placeholder="example@email.com"
                               required
                               autocomplete="email">
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i>
                        <span>Gửi Hướng Dẫn Đặt Lại</span>
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #666;">Đang gửi...</p>
                </div>

                <!-- Back Link -->
                <div class="back-link">
                    <a th:href="@{/login}">
                        <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
