<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - LifestyleShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <a href="/" class="auth-logo">
            <div class="auth-logo-icon">
                <i class="fas fa-shopping-bag"></i>
            </div>
            <span class="auth-logo-text">LifestyleShop</span>
        </a>

        <h1 class="auth-title">Chào mừng trở lại 👋</h1>
        <p class="auth-subtitle">Đăng nhập để tiếp tục mua sắm</p>

        <!-- Alerts -->
        <div th:if="${param.error}" class="alert-ls alert-ls-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span>Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.</span>
        </div>
        <div th:if="${param.logout}" class="alert-ls alert-ls-success">
            <i class="fas fa-check-circle"></i>
            <span>Bạn đã đăng xuất thành công.</span>
        </div>
        <div th:if="${param.registered}" class="alert-ls alert-ls-success">
            <i class="fas fa-check-circle"></i>
            <span>Đăng ký thành công! Vui lòng đăng nhập.</span>
        </div>

        <!-- Social login -->
        <div class="row g-2 mb-3">
            <div class="col-6">
                <button type="button" class="btn-social-auth" onclick="alert('Google login chưa được triển khai')">
                    <i class="fab fa-google text-danger"></i> Google
                </button>
            </div>
            <div class="col-6">
                <button type="button" class="btn-social-auth" onclick="alert('SSO login chưa được triển khai')">
                    <i class="fas fa-key" style="color:var(--clr-primary)"></i> SSO
                </button>
            </div>
        </div>

        <div class="auth-divider">hoặc đăng nhập bằng email</div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">

            <div class="form-group-ls">
                <label class="form-label-ls">Email / Tên đăng nhập</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-envelope input-icon-ls"></i>
                    <input type="text" name="username" class="form-control-ls"
                           placeholder="admin@lifestyleshop.com" required autocomplete="username">
                </div>
            </div>

            <div class="form-group-ls">
                <label class="form-label-ls">Mật khẩu</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-lock input-icon-ls"></i>
                    <input type="password" id="loginPwd" name="password" class="form-control-ls"
                           placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle-btn" onclick="togglePwd('loginPwd','loginPwdBtn')" id="loginPwdBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4" style="font-size:.875rem;">
                <label style="cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--txt-muted);">
                    <input type="checkbox" name="remember-me" style="accent-color:var(--clr-primary);">
                    Ghi nhớ đăng nhập
                </label>
                <a href="/forgot-password" style="color:var(--clr-primary);font-weight:600;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-primary-ls btn-lg w-100">
                Đăng nhập <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <p class="text-center mt-4" style="font-size:.875rem;color:var(--txt-muted);">
            Chưa có tài khoản?
            <a href="/register" style="color:var(--clr-primary);font-weight:700;">Đăng ký ngay</a>
        </p>
    </div>
</div>

<script th:src="@{/js/app-ui.js}"></script>

</body>
</html>
