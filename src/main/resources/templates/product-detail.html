<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><title th:text="${product.name} + ' - LifestyleShop'">Chi tiết sản phẩm</title></head>
<body>
<div th:fragment="content">
    <div class="container py-4">

        <!-- Breadcrumb -->
        <ol class="breadcrumb-ls">
            <li><a href="/">Trang chủ</a></li>
            <li><a href="/products">Sản phẩm</a></li>
            <li th:if="${product.category != null}">
                <a th:href="@{/products(categoryId=${product.category.id})}"
                   th:text="${product.category.name}">Danh mục</a>
            </li>
            <li class="active" th:text="${product.name}">Sản phẩm</li>
        </ol>

        <!-- Product Main -->
        <div class="row mb-5 g-4">

            <!-- Image -->
            <div class="col-lg-5">
                <div style="background:var(--bg-soft);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);">
                    <img th:src="${product.image} ?: '/img/product-default.jpg'"
                         th:alt="${product.name}"
                         id="mainProductImage"
                         class="w-100"
                         style="aspect-ratio:1;object-fit:cover;">
                </div>
            </div>

            <!-- Info -->
            <div class="col-lg-7">
                <div th:if="${product.category != null}">
                    <span class="badge-ls badge-primary" th:text="${product.category.name}">Category</span>
                </div>

                <h1 style="font-size:1.75rem;font-weight:800;color:var(--txt);margin:12px 0 10px;"
                    th:text="${product.name}">Tên sản phẩm</h1>

                <!-- Rating -->
                <div class="d-flex align-items-center gap-2 mb-4">
                    <div style="color:#FFCB11;">
                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        <i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                    </div>
                    <span style="font-size:.85rem;color:var(--txt-muted);">4.5 (128 đánh giá)</span>
                    <span class="badge-ls badge-success"><i class="fas fa-check-circle me-1"></i>Còn hàng</span>
                </div>

                <!-- Price -->
                <div class="mb-4 p-4" style="background:var(--bg-soft);border-radius:var(--radius-md);border:1px solid var(--border);">
                    <div class="d-flex align-items-baseline gap-3">
                        <span style="font-size:2rem;font-weight:800;color:var(--clr-primary);"
                              th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                        <span style="font-size:1rem;color:var(--txt-faint);text-decoration:line-through;"
                              th:if="${product.price lt 2000000}"
                              th:text="${#numbers.formatDecimal(product.price * 1.2, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                    </div>
                    <div class="d-flex gap-3 mt-2" style="font-size:.8rem;color:var(--txt-muted);">
                        <span><i class="fas fa-truck me-1" style="color:var(--clr-success)"></i>Miễn phí vận chuyển trên 500k</span>
                        <span><i class="fas fa-undo me-1" style="color:var(--clr-primary)"></i>Đổi trả 30 ngày</span>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-4" th:if="${product.description != null}">
                    <h6 style="font-weight:700;color:var(--txt);margin-bottom:8px;">Mô tả sản phẩm</h6>
                    <p style="color:var(--txt-muted);font-size:.9rem;line-height:1.7;" th:text="${product.description}"></p>
                </div>

                <!-- Quantity + Add to Cart -->
                <div class="mb-4">
                    <label style="font-size:.85rem;font-weight:600;color:var(--txt-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:block;">Số lượng</label>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="qty-control">
                            <button type="button" class="qty-btn" id="qty-dec">
                                <i class="fas fa-minus"></i>
                            </button>
                            <input type="number" id="qty-main" class="qty-input" value="1" min="1" max="99" readonly>
                            <button type="button" class="qty-btn" id="qty-inc">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>

                        <button class="btn-primary-ls btn-lg flex-grow-1 btn-add-cart btn-add-cart-ajax"
                                th:data-product-id="${product.id}">
                            <i class="fas fa-shopping-cart"></i> Thêm vào giỏ hàng
                        </button>

                        <button class="nav-icon-btn" style="width:44px;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-sm);" title="Thêm vào yêu thích">
                            <i class="far fa-heart" style="font-size:1.1rem;"></i>
                        </button>
                    </div>
                </div>

                <!-- Meta -->
                <div class="pt-4" style="border-top:1px solid var(--border);">
                    <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 20px;font-size:.85rem;">
                        <span style="color:var(--txt-muted);font-weight:600;">SKU:</span>
                        <span style="color:var(--txt);" th:text="${product.id}">12345</span>
                        <span style="color:var(--txt-muted);font-weight:600;" th:if="${product.category != null}">Danh mục:</span>
                        <a th:href="@{/products(categoryId=${product.category.id})}"
                           th:text="${product.category.name}"
                           th:if="${product.category != null}"
                           style="color:var(--clr-primary);font-weight:600;">Category</a>
                    </div>
                    <div class="d-flex align-items-center gap-3 mt-3" style="font-size:.85rem;color:var(--txt-muted);">
                        <span style="font-weight:600;">Chia sẻ:</span>
                        <a href="#" style="color:#1877F2;"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" style="color:#1DA1F2;"><i class="fab fa-twitter"></i></a>
                        <a href="#" style="color:#E4405F;"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Related products -->
        <div th:if="${relatedProducts != null and !relatedProducts.isEmpty()}">
            <div class="section-header">
                <h2 class="section-title-ls"><i class="fas fa-th-large me-2" style="color:var(--clr-primary)"></i>Sản phẩm liên quan</h2>
                <a href="/products" class="view-all-btn">Xem tất cả <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="row g-4">
                <div class="col-6 col-md-3" th:each="related : ${relatedProducts}">
                    <div class="product-card">
                        <div class="product-img-wrap">
                            <a th:href="@{/products/{id}(id=${related.id})}">
                                <img th:src="${related.image} ?: '/img/product-default.jpg'"
                                     th:alt="${related.name}" class="product-img">
                            </a>
                        </div>
                        <div class="product-body">
                            <p class="product-cat" th:text="${related.category?.name} ?: 'Sản phẩm'">CAT</p>
                            <a th:href="@{/products/{id}(id=${related.id})}" class="product-name">
                                <span th:text="${related.name}">Product Name</span>
                            </a>
                            <div class="product-price-wrap">
                                <span class="price-main"
                                      th:text="${#numbers.formatDecimal(related.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                            </div>
                            <button class="btn-add-cart btn-add-cart-ajax"
                                    th:data-product-id="${related.id}">
                                <i class="fas fa-shopping-cart"></i> Thêm vào giỏ
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
