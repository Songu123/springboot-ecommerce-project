<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Đổi mật khẩu | LifestyleShop</title>
</head>
<body>
<div th:fragment="content">
    <div class="container py-5">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-lg-3">
                <div th:replace="~{profile/sidebar :: sidebar}"></div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-6">

                <!-- Flash messages -->
                <div th:if="${success}" class="alert-ls alert-ls-success animate-up mb-4">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}">Thành công</span>
                </div>
                <div th:if="${error}" class="alert-ls alert-ls-danger animate-up mb-4">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span th:text="${error}">Có lỗi xảy ra</span>
                </div>

                <div class="checkout-step animate-up delay-1">
                    <div class="checkout-step-title">
                        <div class="step-num"><i class="fas fa-shield-alt" style="font-size:.7rem"></i></div>
                        Bảo mật &amp; Mật khẩu
                    </div>
                    <p style="font-size:.85rem;color:var(--txt-muted);margin-bottom:24px;margin-top:-8px;">
                        Mật khẩu mạnh giúp bảo vệ tài khoản của bạn tốt hơn
                    </p>

                    <form th:action="@{/profile/change-password}" method="post">
                        <!-- Current Password -->
                        <div class="mb-4">
                            <label class="form-label-ls">
                                <i class="fas fa-lock-open me-1" style="color:var(--clr-primary)"></i>Mật khẩu hiện tại *
                            </label>
                            <div class="input-wrapper-ls">
                                <i class="fas fa-lock input-icon-ls"></i>
                                <input type="password" id="currentPassword" name="currentPassword"
                                       class="form-control-ls"
                                       placeholder="Nhập mật khẩu hiện tại" required>
                            </div>
                        </div>

                        <!-- New Password -->
                        <div class="mb-4">
                            <label class="form-label-ls">
                                <i class="fas fa-key me-1" style="color:var(--clr-primary)"></i>Mật khẩu mới *
                            </label>
                            <div class="input-wrapper-ls">
                                <i class="fas fa-key input-icon-ls"></i>
                                <input type="password" id="newPassword" name="newPassword"
                                       class="form-control-ls"
                                       placeholder="Tối thiểu 6 ký tự" required minlength="6"
                                       oninput="checkCpPasswordStrength()">
                                <button type="button" class="password-toggle-btn"
                                        onclick="togglePwd('newPassword', 'toggleNewPwd')" id="toggleNewPwd">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <!-- Strength indicator -->
                            <div class="strength-bars mt-2">
                                <div class="strength-bar" id="cpbar1"></div>
                                <div class="strength-bar" id="cpbar2"></div>
                                <div class="strength-bar" id="cpbar3"></div>
                                <div class="strength-bar" id="cpbar4"></div>
                            </div>
                            <small id="cp-strength-text" style="font-size:.75rem;font-weight:600;margin-top:4px;display:block;"></small>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label-ls">
                                <i class="fas fa-check-double me-1" style="color:var(--clr-primary)"></i>Xác nhận mật khẩu mới *
                            </label>
                            <div class="input-wrapper-ls">
                                <i class="fas fa-check-double input-icon-ls"></i>
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                       class="form-control-ls"
                                       placeholder="Nhập lại mật khẩu mới" required>
                                <button type="button" class="password-toggle-btn"
                                        onclick="togglePwd('confirmPassword', 'toggleConfirmPwd')" id="toggleConfirmPwd">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Security tips -->
                        <div style="background:var(--clr-primary-glow);border:1px solid rgba(77,109,154,.2);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:24px;">
                            <p style="font-size:.8rem;font-weight:700;color:var(--clr-primary);margin-bottom:8px;">
                                <i class="fas fa-lightbulb me-1"></i>Gợi ý mật khẩu mạnh:
                            </p>
                            <ul style="font-size:.78rem;color:var(--txt-muted);margin:0;padding-left:18px;line-height:1.8;">
                                <li>Ít nhất 8 ký tự</li>
                                <li>Kết hợp chữ hoa, chữ thường</li>
                                <li>Có chứa số và ký tự đặc biệt</li>
                            </ul>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-3 flex-wrap">
                            <button type="submit" class="btn-primary-ls btn-lg">
                                <i class="fas fa-shield-alt me-2"></i>Cập nhật mật khẩu
                            </button>
                            <a th:href="@{/profile}" class="btn-outline-ls btn-lg">
                                <i class="fas fa-times me-2"></i>Hủy bỏ
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
