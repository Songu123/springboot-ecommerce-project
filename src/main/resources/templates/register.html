<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - LifestyleShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div class="auth-page" style="padding:40px 16px;">
    <div class="auth-card" style="max-width:520px;">

        <!-- Logo -->
        <a href="/" class="auth-logo">
            <div class="auth-logo-icon"><i class="fas fa-shopping-bag"></i></div>
            <span class="auth-logo-text">LifestyleShop</span>
        </a>

        <h1 class="auth-title">Tạo tài khoản 🚀</h1>
        <p class="auth-subtitle">Tham gia LifestyleShop và khám phá hàng ngàn sản phẩm cao cấp</p>

        <!-- Error alert -->
        <div th:if="${error}" class="alert-ls alert-ls-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Lỗi đăng ký</span>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" method="post" id="registerForm" onsubmit="return validateRegister()">

            <!-- Full Name -->
            <div class="form-group-ls">
                <label class="form-label-ls">Họ và tên</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-user input-icon-ls"></i>
                    <input type="text" name="fullName" class="form-control-ls"
                           placeholder="Nguyễn Văn A" required>
                </div>
            </div>

            <!-- Username -->
            <div class="form-group-ls">
                <label class="form-label-ls">Tên đăng nhập</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-at input-icon-ls"></i>
                    <input type="text" name="username" class="form-control-ls"
                           placeholder="nguyenvana123" required autocomplete="username">
                </div>
            </div>

            <!-- Email -->
            <div class="form-group-ls">
                <label class="form-label-ls">Email</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-envelope input-icon-ls"></i>
                    <input type="email" name="email" class="form-control-ls"
                           placeholder="email@example.com" required autocomplete="email">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group-ls">
                <label class="form-label-ls">Mật khẩu</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-lock input-icon-ls"></i>
                    <input type="password" id="regPwd" name="password" class="form-control-ls"
                           placeholder="Tối thiểu 8 ký tự" required autocomplete="new-password"
                           oninput="checkPasswordStrength('regPwd')">
                    <button type="button" class="password-toggle-btn" onclick="togglePwd('regPwd','regPwdBtn')" id="regPwdBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <!-- Strength meter -->
                <div class="strength-bars mt-2" id="pwdStrengthBars">
                    <div class="strength-bar" id="sbar1"></div>
                    <div class="strength-bar" id="sbar2"></div>
                    <div class="strength-bar" id="sbar3"></div>
                    <div class="strength-bar" id="sbar4"></div>
                </div>
                <p id="strength-text" style="font-size:.75rem;margin-top:4px;font-weight:600;min-height:1rem;"></p>
            </div>

            <!-- Confirm Password -->
            <div class="form-group-ls">
                <label class="form-label-ls">Xác nhận mật khẩu</label>
                <div class="input-wrapper-ls">
                    <i class="fas fa-lock input-icon-ls"></i>
                    <input type="password" id="regPwdConfirm" name="confirmPassword" class="form-control-ls"
                           placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                    <button type="button" class="password-toggle-btn" onclick="togglePwd('regPwdConfirm','regPwdConfirmBtn')" id="regPwdConfirmBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <p id="pwd-match-msg" style="font-size:.75rem;margin-top:4px;font-weight:600;min-height:1rem;"></p>
            </div>

            <!-- Terms -->
            <div class="d-flex align-items-flex-start gap-2 mb-4"
                 style="font-size:.85rem;color:var(--txt-muted);align-items:flex-start;">
                <input type="checkbox" id="terms" required style="accent-color:var(--clr-primary);margin-top:3px;flex-shrink:0;">
                <label for="terms">
                    Tôi đồng ý với
                    <a href="#" style="color:var(--clr-primary);font-weight:600;">Điều khoản dịch vụ</a>
                    và
                    <a href="#" style="color:var(--clr-primary);font-weight:600;">Chính sách bảo mật</a>
                </label>
            </div>

            <button type="submit" class="btn-primary-ls btn-lg w-100">
                Tạo tài khoản <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-divider">Đã có tài khoản?</div>

        <a href="/login" class="btn-outline-ls w-100 d-block text-center py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </a>
    </div>
</div>

<script th:src="@{/js/app-ui.js}"></script>
<script>
    document.getElementById('regPwdConfirm').addEventListener('input', function () {
        const pwd = document.getElementById('regPwd').value;
        const msg = document.getElementById('pwd-match-msg');
        if (this.value && this.value !== pwd) {
            msg.textContent = 'Mật khẩu không khớp';
            msg.style.color = 'var(--clr-danger)';
        } else if (this.value === pwd) {
            msg.textContent = 'Mật khẩu khớp ✓';
            msg.style.color = 'var(--clr-success)';
        } else {
            msg.textContent = '';
        }
    });

    function validateRegister() {
        const pwd = document.getElementById('regPwd').value;
        const confirm = document.getElementById('regPwdConfirm').value;
        if (pwd !== confirm) {
            alert('Mật khẩu xác nhận không khớp!');
            return false;
        }
        if (pwd.length < 8) {
            alert('Mật khẩu phải có ít nhất 8 ký tự!');
            return false;
        }
        return true;
    }
</script>
</body>
</html>
