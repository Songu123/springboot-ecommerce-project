<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - E-Commerce</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .card-header h2 {
            font-size: 24px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card-body {
            padding: 30px 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-meter {
            width: 100%;
            height: 5px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .strength-meter-fill {
            height: 100%;
            width: 0%;
            background: #dc3545;
            transition: all 0.3s;
        }

        .strength-meter.weak .strength-meter-fill {
            background: #dc3545;
            width: 33%;
        }

        .strength-meter.fair .strength-meter-fill {
            background: #ffc107;
            width: 66%;
        }

        .strength-meter.strong .strength-meter-fill {
            background: #28a745;
            width: 100%;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
            border-left: 4px solid #667eea;
        }

        .info-box i {
            margin-right: 8px;
            color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-lock"></i> Đặt Lại Mật Khẩu
                </h2>
                <p>Nhập mật khẩu mới của bạn</p>
            </div>

            <div class="card-body">
                <!-- Error Message (Invalid Token) -->
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}"></span>
                    <div style="margin-top: 15px;">
                        <a th:href="@{/login}" style="color: #155724; font-weight: bold;">
                            Đăng nhập với mật khẩu mới →
                        </a>
                    </div>
                </div>

                <!-- Form (Show only if token is valid) -->
                <form id="resetPasswordForm" th:if="${success == null && error == null}">
                    <input type="hidden" id="token" th:value="${token}">

                    <div class="info-box">
                        <i class="fas fa-shield-alt"></i>
                        Mật khẩu của bạn phải có ít nhất 6 ký tự.
                    </div>

                    <div class="form-group">
                        <label for="newPassword">
                            <i class="fas fa-lock" style="color: #667eea; margin-right: 5px;"></i>
                            Mật Khẩu Mới
                        </label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="newPassword"
                                   name="newPassword"
                                   placeholder="Nhập mật khẩu mới"
                                   required
                                   minlength="6">
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-meter" id="strengthMeter">
                                <div class="strength-meter-fill"></div>
                            </div>
                            <span id="strengthText">Mật khẩu quá yếu</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-check-circle" style="color: #667eea; margin-right: 5px;"></i>
                            Xác Nhận Mật Khẩu
                        </label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="confirmPassword"
                                   name="confirmPassword"
                                   placeholder="Nhập lại mật khẩu"
                                   required
                                   minlength="6">
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div id="matchError" style="color: #dc3545; font-size: 13px; margin-bottom: 15px; display: none;">
                        <i class="fas fa-times-circle"></i> Mật khẩu không khớp
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i>
                        <span>Cập Nhật Mật Khẩu</span>
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #666;">Đang xử lý...</p>
                </div>

                <!-- Back Link -->
                <div class="back-link">
                    <a th:href="@{/login}">
                        <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const btn = event.target.closest('.password-toggle');

            if (field.type === 'password') {
                field.type = 'text';
                btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                field.type = 'password';
                btn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        function checkPasswordStrength(password) {
            const meter = document.getElementById('strengthMeter');
            const text = document.getElementById('strengthText');

            if (password.length < 6) {
                meter.className = 'strength-meter';
                text.textContent = 'Quá yếu (tối thiểu 6 ký tự)';
                text.style.color = '#dc3545';
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            if (strength <= 1) {
                meter.className = 'strength-meter weak';
                text.textContent = 'Yếu';
                text.style.color = '#dc3545';
            } else if (strength <= 2) {
                meter.className = 'strength-meter fair';
                text.textContent = 'Trung bình';
                text.style.color = '#ffc107';
            } else {
                meter.className = 'strength-meter strong';
                text.textContent = 'Mạnh';
                text.style.color = '#28a745';
            }
        }

        document.getElementById('newPassword').addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchError = document.getElementById('matchError');

            if (confirmPassword && newPassword !== confirmPassword) {
                matchError.style.display = 'block';
            } else {
                matchError.style.display = 'none';
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const form = this;
            const loading = document.getElementById('loading');

            // Validate
            if (newPassword !== confirmPassword) {
                alert('Mật khẩu không khớp!');
                return;
            }

            if (newPassword.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }

            // Show loading
            form.style.display = 'none';
            loading.style.display = 'block';

            // Send request
            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token: token,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.message) {
                    const successDiv = document.createElement('div');
                    successDiv.className = 'alert alert-success';
                    successDiv.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message +
                        '<div style="margin-top: 15px;"><a href="/login" style="color: #155724; font-weight: bold;">Đăng nhập với mật khẩu mới →</a></div>';
                    document.querySelector('.card-body').insertBefore(successDiv, document.querySelector('.card-body').firstChild);
                } else if (data.error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'alert alert-danger';
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + data.error;
                    document.querySelector('.card-body').insertBefore(errorDiv, document.querySelector('.card-body').firstChild);
                    form.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'alert alert-danger';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Có lỗi xảy ra. Vui lòng thử lại.';
                document.querySelector('.card-body').insertBefore(errorDiv, document.querySelector('.card-body').firstChild);
                loading.style.display = 'none';
                form.style.display = 'block';
            });
        });

        // Initial password strength check
        checkPasswordStrength(document.getElementById('newPassword').value);
    </script>
</body>
</html>
