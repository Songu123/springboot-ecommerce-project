<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - E-Commerce</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-lock"></i> Đặt Lại Mật Khẩu
                </h2>
                <p>Nhập mật khẩu mới của bạn</p>
            </div>

            <div class="card-body">
                <!-- Error Message (Invalid Token) -->
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}"></span>
                    <div style="margin-top: 15px;">
                        <a th:href="@{/login}" style="color: #155724; font-weight: bold;">
                            Đăng nhập với mật khẩu mới →
                        </a>
                    </div>
                </div>

                <!-- Form (Show only if token is valid) -->
                <form id="resetPasswordForm" th:if="${success == null && error == null}">
                    <input type="hidden" id="token" th:value="${token}">

                    <div class="info-box">
                        <i class="fas fa-shield-alt"></i>
                        Mật khẩu của bạn phải có ít nhất 6 ký tự.
                    </div>

                    <div class="form-group">
                        <label for="newPassword">
                            <i class="fas fa-lock" style="color: #667eea; margin-right: 5px;"></i>
                            Mật Khẩu Mới
                        </label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="newPassword"
                                   name="newPassword"
                                   placeholder="Nhập mật khẩu mới"
                                   required
                                   minlength="6">
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-meter" id="strengthMeter">
                                <div class="strength-meter-fill"></div>
                            </div>
                            <span id="strengthText">Mật khẩu quá yếu</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-check-circle" style="color: #667eea; margin-right: 5px;"></i>
                            Xác Nhận Mật Khẩu
                        </label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="confirmPassword"
                                   name="confirmPassword"
                                   placeholder="Nhập lại mật khẩu"
                                   required
                                   minlength="6">
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div id="matchError" style="color: #dc3545; font-size: 13px; margin-bottom: 15px; display: none;">
                        <i class="fas fa-times-circle"></i> Mật khẩu không khớp
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i>
                        <span>Cập Nhật Mật Khẩu</span>
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #666;">Đang xử lý...</p>
                </div>

                <!-- Back Link -->
                <div class="back-link">
                    <a th:href="@{/login}">
                        <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
